<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Jarvis — Tu mentor personal</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<style>
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f5f4f0;
  --bg-tertiary:#ebe9e3;
  --text-primary:#16150f;
  --text-secondary:#5f5e5a;
  --text-tertiary:#888780;
  --border-tertiary:rgba(22,21,15,0.1);
  --border-secondary:rgba(22,21,15,0.2);
  --accent:#1D9E75;
  --radius-md:8px;
  --radius-lg:12px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg-primary:#16150f;
    --bg-secondary:#201f19;
    --bg-tertiary:#2a2922;
    --text-primary:#f5f4f0;
    --text-secondary:#b4b2a9;
    --text-tertiary:#888780;
    --border-tertiary:rgba(255,255,255,0.1);
    --border-secondary:rgba(255,255,255,0.2);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg-tertiary);
  color:var(--text-primary);
  min-height:100vh;
  padding-bottom:80px;
}
.app-header{
  position:sticky;top:0;z-index:50;
  background:var(--bg-primary);
  border-bottom:0.5px solid var(--border-tertiary);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.app-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.app-greeting{font-size:12px;color:var(--text-secondary)}
.container{max-width:480px;margin:0 auto;padding:16px}
.section{display:none}
.section.active{display:block}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.mc{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px}
.ml{font-size:11px;color:var(--text-secondary);margin-bottom:6px}
.mv{font-size:20px;font-weight:600}
.ms{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.card{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}
.dr:last-child{border-bottom:none}
.dr span{color:var(--text-secondary)}
.pb{height:8px;background:var(--border-tertiary);border-radius:4px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:4px;transition:width .4s}
.badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:8px;font-weight:600}
.bg-green{background:#EAF3DE;color:#27500A}
.bg-blue{background:#E6F1FB;color:#0C447C}
.bg-amber{background:#FAEEDA;color:#633806}
.bg-coral{background:#FAECE7;color:#712B13}
.bg-purple{background:#EEEDFE;color:#3C3489}
.nav-bottom{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg-primary);
  border-top:0.5px solid var(--border-tertiary);
  display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text-tertiary);font-size:10px;
  background:none;border:none;cursor:pointer;
  padding:4px 8px;
}
.nav-item.active{color:var(--accent)}
.nav-item i{font-size:20px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border-tertiary)}
.task-item:last-child{border-bottom:none}
.tck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border-secondary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tck.done{background:var(--accent);border-color:var(--accent)}
.tt{font-size:13px;line-height:1.4}
.tt.done{color:var(--text-tertiary);text-decoration:line-through}
.water-controls{display:flex;align-items:center;gap:12px;margin:10px 0}
.wbtn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border-secondary);background:transparent;font-size:18px;cursor:pointer;color:var(--text-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wdisp{font-size:28px;font-weight:600;flex:1;text-align:center}
.wsub{font-size:11px;color:var(--text-secondary);text-align:center}
.ai-box{background:var(--bg-secondary);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.ai-msg{font-size:13px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap}
.ai-row{display:flex;gap:8px;margin-top:10px}
.ai-row input{flex:1;font-size:13px;border-radius:var(--radius-md);padding:10px 12px;border:1px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-primary)}
.ai-row button{padding:10px 16px;border-radius:var(--radius-md);border:none;background:var(--accent);color:white;font-size:13px;cursor:pointer;font-weight:600}
.qbtn{font-size:11px;padding:6px 12px;border-radius:14px;border:1px solid var(--border-secondary);background:transparent;color:var(--text-secondary);cursor:pointer;margin:3px 4px 3px 0}
.score-ring{width:90px;height:90px;margin:0 auto 10px}
.exer-block{border:0.5px solid var(--border-tertiary);border-radius:var(--radius-md);padding:11px 13px;margin-bottom:8px}
.exer-name{font-size:13px;font-weight:600;margin-bottom:4px}
.exer-detail{font-size:11px;color:var(--text-secondary);line-height:1.6}
.exer-why{font-size:10px;color:#0C447C;background:#E6F1FB;border-radius:5px;padding:2px 8px;display:inline-block;margin-top:5px}
.warn-box{background:#FCEBEB;border-radius:var(--radius-md);padding:11px 13px;margin-bottom:10px}
.warn-title{font-size:12px;font-weight:600;color:#791F1F;margin-bottom:6px}
.warn-item{font-size:11px;color:#A32D2D;padding:2px 0}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input,.input-row select{flex:1;font-size:13px;border-radius:var(--radius-md);padding:9px 11px;border:1px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-primary)}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:var(--radius-md);padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
.expense-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px}
.expense-item:last-child{border-bottom:none}
.expense-del{color:#A32D2D;cursor:pointer;font-size:14px;padding:2px 6px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title"><i class="ti ti-brain" aria-hidden="true"></i> Jarvis</div>
  <div class="app-greeting" id="greeting">Hola, Sr. Sotomayor</div>
</header>

<div class="container">

  <div id="sec-hoy" class="section active">
    <div id="hoy-content"></div>
  </div>

  <div id="sec-entreno" class="section">
    <div id="entreno-content"></div>
  </div>

  <div id="sec-finanzas" class="section">
    <div id="finanzas-content"></div>
  </div>

  <div id="sec-habitos" class="section">
    <div id="habitos-content"></div>
  </div>

  <div id="sec-jarvis" class="section">
    <div id="jarvis-content"></div>
  </div>

</div>

<nav class="nav-bottom">
  <button class="nav-item active" data-sec="hoy" onclick="switchSection('hoy')">
    <i class="ti ti-home" aria-hidden="true"></i><span>Hoy</span>
  </button>
  <button class="nav-item" data-sec="entreno" onclick="switchSection('entreno')">
    <i class="ti ti-barbell" aria-hidden="true"></i><span>Entreno</span>
  </button>
  <button class="nav-item" data-sec="finanzas" onclick="switchSection('finanzas')">
    <i class="ti ti-coin" aria-hidden="true"></i><span>Finanzas</span>
  </button>
  <button class="nav-item" data-sec="habitos" onclick="switchSection('habitos')">
    <i class="ti ti-checklist" aria-hidden="true"></i><span>Hábitos</span>
  </button>
  <button class="nav-item" data-sec="jarvis" onclick="switchSection('jarvis')">
    <i class="ti ti-message-circle" aria-hidden="true"></i><span>Jarvis</span>
  </button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>

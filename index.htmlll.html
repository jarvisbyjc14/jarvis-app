<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0D0C">
<title>Jarvis</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0B0D0C;
  --bg-1:#131614;
  --bg-2:#1A1E1B;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(255,255,255,0.16);
  --ink:#EDEFEC;
  --ink-dim:#9BA39D;
  --ink-faint:#5C645E;
  --signal:#2ED679;
  --signal-dim:#1A8F52;
  --signal-bg:rgba(46,214,121,0.1);
  --amber:#F0A23D;
  --amber-bg:rgba(240,162,61,0.1);
  --red:#E05C5C;
  --red-bg:rgba(224,92,92,0.1);
  --blue:#4DA3E0;
  --blue-bg:rgba(77,163,224,0.1);
  --r-sm:6px;
  --r-md:10px;
  --r-lg:16px;
  --font-display:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg-0)}
body{
  font-family:var(--font-display);
  background:var(--bg-0);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:88px;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--signal-bg);color:var(--signal)}

/* header */
.app-header{
  position:sticky;top:0;z-index:50;
  background:rgba(11,13,12,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(160deg,var(--signal),var(--signal-dim));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:600;font-size:14px;color:#0B0D0C;
  flex-shrink:0;
}
.brand-name{font-size:17px;font-weight:600;letter-spacing:-0.01em}
.brand-status{font-family:var(--font-mono);font-size:9px;color:var(--signal);letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.brand-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--signal);box-shadow:0 0 6px var(--signal)}
.app-greeting{font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);text-align:right}
.app-greeting strong{color:var(--ink-dim);display:block;font-size:12px;font-family:var(--font-display);font-weight:500}

.container{max-width:480px;margin:0 auto;padding:18px 16px}
.section{display:none}
.section.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.eyebrow{
  font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.eyebrow::after{content:'';flex:1;height:1px;background:var(--line)}

/* grids */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.mc{
  background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);
  padding:14px 16px;position:relative;overflow:hidden;
}
.ml{font-size:10px;color:var(--ink-faint);margin-bottom:8px;font-family:var(--font-mono);letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.mv{font-size:22px;font-weight:600;font-family:var(--font-mono);letter-spacing:-0.02em}
.ms{font-size:11px;color:var(--ink-faint);margin-top:3px}

/* cards */
.card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:9px;letter-spacing:-0.01em}
.ct i{color:var(--signal);font-size:17px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
.dr:last-child{border-bottom:none}
.dr span{color:var(--ink-dim)}
.dr strong{font-family:var(--font-mono);font-weight:500}

.pb{height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden;margin:8px 0}
.pf{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.badge{display:inline-block;font-size:9px;padding:4px 9px;border-radius:5px;font-weight:600;font-family:var(--font-mono);letter-spacing:0.03em;text-transform:uppercase}
.bg-green{background:var(--signal-bg);color:var(--signal)}
.bg-blue{background:var(--blue-bg);color:var(--blue)}
.bg-amber{background:var(--amber-bg);color:var(--amber)}
.bg-coral{background:var(--red-bg);color:var(--red)}
.bg-purple{background:rgba(167,139,250,0.1);color:#A78BFA}

/* bottom nav */
.nav-bottom{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(11,13,12,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:10px 4px calc(10px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--ink-faint);font-size:9px;font-family:var(--font-mono);
  letter-spacing:0.03em;text-transform:uppercase;
  background:none;border:none;cursor:pointer;
  padding:5px 10px;border-radius:var(--r-sm);
  transition:color .15s;
}
.nav-item.active{color:var(--signal)}
.nav-item i{font-size:20px}

/* tasks */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.task-item:last-child{border-bottom:none}
.tck{
  width:21px;height:21px;border-radius:6px;border:1.5px solid var(--line-strong);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  margin-top:1px;transition:all .15s;background:var(--bg-2);
}
.tck.done{background:var(--signal);border-color:var(--signal)}
.tt{font-size:13.5px;line-height:1.45;color:var(--ink)}
.tt.done{color:var(--ink-faint);text-decoration:line-through}

/* water */
.water-controls{display:flex;align-items:center;gap:14px;margin:14px 0}
.wbtn{
  width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line-strong);
  background:var(--bg-2);font-size:18px;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;font-family:var(--font-mono);
}
.wbtn:active{transform:scale(0.92);border-color:var(--signal)}
.wdisp{font-size:30px;font-weight:600;flex:1;text-align:center;font-family:var(--font-mono)}
.wsub{font-size:10px;color:var(--ink-faint);text-align:center;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.04em}

/* score ring */
.ring-wrap{display:flex;justify-content:center;padding:8px 0 4px}
.ring-svg{transform:rotate(-90deg)}
.ring-label{font-family:var(--font-mono)}

/* jarvis chat */
.ai-box{
  background:linear-gradient(165deg,var(--bg-1),var(--bg-2));
  border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;
  position:relative;
}
.ai-box::before{
  content:'';position:absolute;top:0;left:18px;right:18px;height:1px;
  background:linear-gradient(90deg,transparent,var(--signal),transparent);opacity:0.5;
}
.ai-tag{font-family:var(--font-mono);font-size:9px;color:var(--signal);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-tag::before{content:'';width:5px;height:5px;background:var(--signal);border-radius:50%}
.ai-msg{font-size:13.5px;color:var(--ink-dim);line-height:1.65;white-space:pre-wrap}
.ai-row{display:flex;gap:8px;margin-top:14px}
.ai-row input{
  flex:1;font-size:13px;border-radius:var(--r-md);padding:11px 13px;
  border:1px solid var(--line-strong);background:var(--bg-0);color:var(--ink);
  font-family:var(--font-display);
}
.ai-row input:focus{outline:none;border-color:var(--signal)}
.ai-row button{
  padding:11px 18px;border-radius:var(--r-md);border:none;
  background:var(--signal);color:#0B0D0C;font-size:13px;cursor:pointer;font-weight:600;
  transition:opacity .15s;
}
.ai-row button:active{opacity:0.8}
.qbtn{
  font-size:11px;padding:7px 13px;border-radius:20px;border:1px solid var(--line-strong);
  background:var(--bg-2);color:var(--ink-dim);cursor:pointer;margin:3px 5px 3px 0;
  font-family:var(--font-display);transition:all .15s;
}
.qbtn:active{border-color:var(--signal);color:var(--signal)}

/* exercises */
.exer-block{border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;margin-bottom:9px;background:var(--bg-0)}
.exer-name{font-size:13.5px;font-weight:600;margin-bottom:5px}
.exer-detail{font-size:11.5px;color:var(--ink-dim);line-height:1.6;font-family:var(--font-mono)}
.exer-why{font-size:10px;color:var(--blue);background:var(--blue-bg);border-radius:5px;padding:3px 9px;display:inline-block;margin-top:7px;font-family:var(--font-mono)}

.warn-box{background:var(--red-bg);border:1px solid rgba(224,92,92,0.25);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px}
.warn-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:7px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.03em}
.warn-item{font-size:12px;color:#E89B9B;padding:3px 0;padding-left:14px;position:relative}
.warn-item::before{content:'×';position:absolute;left:0;color:var(--red);font-weight:700}

/* finance */
.input-row{display:flex;gap:8px;margin-bottom:12px}
.input-row input{
  flex:1;font-size:13px;border-radius:var(--r-md);padding:10px 13px;
  border:1px solid var(--line-strong);background:var(--bg-0);color:var(--ink);
  font-family:var(--font-display);
}
.input-row input:focus{outline:none;border-color:var(--signal)}
.btn-primary{
  background:var(--signal);color:#0B0D0C;border:none;border-radius:var(--r-md);
  padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-display);
}
.expense-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.expense-item:last-child{border-bottom:none}
.expense-item strong{font-family:var(--font-mono)}
.expense-del{color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px;opacity:0.7}
.expense-del:active{opacity:1}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.cycle-track{display:flex;gap:5px;margin:10px 0}
.cycle-dot{flex:1;height:5px;border-radius:3px;background:var(--bg-2)}
.cycle-dot.filled{background:var(--signal)}
.cycle-dot.current{background:var(--amber)}

.chart-wrap{position:relative;height:200px;margin:10px 0}
.stat-strip{display:flex;justify-content:space-between;margin-top:10px;padding-top:12px;border-top:1px solid var(--line)}
.stat-strip-item{text-align:center;flex:1}
.stat-strip-val{font-family:var(--font-mono);font-size:15px;font-weight:600}
.stat-strip-label{font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.04em;margin-top:3px;font-family:var(--font-mono)}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">J</div>
    <div>
      <div class="brand-name">Jarvis</div>
      <div class="brand-status">Sistema activo</div>
    </div>
  </div>
  <div class="app-greeting" id="greeting"><strong>Sr. Sotomayor</strong>cargando...</div>
</header>

<div class="container">

  <div id="sec-hoy" class="section active">
    <div id="hoy-content"></div>
  </div>

  <div id="sec-entreno" class="section">
    <div id="entreno-content"></div>
  </div>

  <div id="sec-finanzas" class="section">
    <div id="finanzas-content"></div>
  </div>

  <div id="sec-habitos" class="section">
    <div id="habitos-content"></div>
  </div>

  <div id="sec-progreso" class="section">
    <div id="progreso-content"></div>
  </div>

  <div id="sec-jarvis" class="section">
    <div id="jarvis-content"></div>
  </div>

</div>

<nav class="nav-bottom">
  <button class="nav-item active" data-sec="hoy" onclick="switchSection('hoy')">
    <i class="ti ti-home" aria-hidden="true"></i><span>Hoy</span>
  </button>
  <button class="nav-item" data-sec="entreno" onclick="switchSection('entreno')">
    <i class="ti ti-barbell" aria-hidden="true"></i><span>Entreno</span>
  </button>
  <button class="nav-item" data-sec="finanzas" onclick="switchSection('finanzas')">
    <i class="ti ti-coin" aria-hidden="true"></i><span>Finanzas</span>
  </button>
  <button class="nav-item" data-sec="habitos" onclick="switchSection('habitos')">
    <i class="ti ti-checklist" aria-hidden="true"></i><span>Hábitos</span>
  </button>
  <button class="nav-item" data-sec="progreso" onclick="switchSection('progreso')">
    <i class="ti ti-chart-line" aria-hidden="true"></i><span>Progreso</span>
  </button>
  <button class="nav-item" data-sec="jarvis" onclick="switchSection('jarvis')">
    <i class="ti ti-message-circle" aria-hidden="true"></i><span>Jarvis</span>
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
